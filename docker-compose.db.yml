services:
  postgres:
    image: postgres:16-alpine
    container_name: cuentas-claras-db
    environment:
      POSTGRES_DB: cuentas_claras
      POSTGRES_USER: cuentas_user
      POSTGRES_PASSWORD: cuentas_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuentas_user -d cuentas_claras"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
