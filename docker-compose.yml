services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cuentas-claras-api
    env_file: ./apps/api/.env
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: cuentas-claras-web
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
